<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Linkgrove - 你的 AI 书签管理工具" />
    <link rel="icon" href="/favicon.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <title>Linkgrove</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.8/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.19/dayjs.min.js"></script>
    <style type="text/tailwindcss">
      .line-clamp-2 {
        overflow: hidden;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }
    </style>
  </head>
  <body class="min-h-screen bg-base-200 text-base-content">
    <div x-data="indexPage" class="min-h-screen flex flex-col">

      <!-- Sticky Header -->
      <header class="sticky top-0 z-30 border-b border-base-300 bg-base-100/95 backdrop-blur">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-3 flex items-center gap-3">
          <!-- Logo -->
          <div class="flex items-center gap-2 shrink-0">
            <div class="w-8 h-8 rounded-lg bg-primary/15 text-primary grid place-items-center">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4" aria-hidden="true">
                <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"></path>
              </svg>
            </div>
            <span class="font-bold text-lg">Linkgrove</span>
          </div>

          <!-- Search -->
          <div class="flex-1 max-w-xl">
            <label class="input input-sm w-full flex items-center gap-1">
              <input
                type="search"
                placeholder="搜索书签..."
                class="grow bg-transparent outline-none text-sm"
                x-model="searchQuery"
                @keydown.enter="fetchBookmarks()"
              />
              <button
                class="btn btn-ghost btn-xs btn-square shrink-0"
                @click="fetchBookmarks()"
                title="搜索"
                aria-label="搜索"
              >
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4" aria-hidden="true">
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.3-4.3"></path>
                </svg>
              </button>
            </label>
          </div>

          <!-- Advanced filter toggle -->
          <button class="btn btn-ghost btn-sm shrink-0" @click="showAdvancedFilter = !showAdvancedFilter" title="高级过滤">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4" aria-hidden="true">
              <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
            </svg>
          </button>

          <!-- Batch mode toggle -->
          <button
            class="btn btn-sm shrink-0"
            :class="isBatchMode ? 'btn-secondary' : 'btn-ghost'"
            @click="toggleBatchMode()"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4" aria-hidden="true">
              <rect x="3" y="5" width="4" height="4" rx="1"></rect><rect x="3" y="13" width="4" height="4" rx="1"></rect>
              <line x1="10" y1="7" x2="21" y2="7"></line><line x1="10" y1="15" x2="21" y2="15"></line>
            </svg>
            <span x-text="isBatchMode ? '退出批量' : '批量'"></span>
          </button>

          <!-- Save button -->
          <button
            class="btn btn-primary btn-sm shrink-0"
            @click="resetSaveForm(); $refs.saveModal.showModal()"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4" aria-hidden="true">
              <path d="M5 12h14"></path>
              <path d="M12 5v14"></path>
            </svg>
            保存链接
          </button>
        </div>
      </header>

      <!-- Advanced Filter Bar -->
      <div x-show="showAdvancedFilter" x-transition class="border-b border-base-300 bg-base-100">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-3 flex flex-wrap gap-3 items-end">
          <label class="flex flex-col gap-1">
            <span class="text-xs opacity-60">域名</span>
            <input type="text" class="input input-bordered input-xs w-36" placeholder="github.com" x-model="domainFilter" @change="fetchBookmarks()" />
          </label>
          <label class="flex flex-col gap-1">
            <span class="text-xs opacity-60">开始日期</span>
            <input type="date" class="input input-bordered input-xs" x-model="dateFrom" @change="fetchBookmarks()" />
          </label>
          <label class="flex flex-col gap-1">
            <span class="text-xs opacity-60">结束日期</span>
            <input type="date" class="input input-bordered input-xs" x-model="dateTo" @change="fetchBookmarks()" />
          </label>
          <button class="btn btn-ghost btn-xs" @click="domainFilter=''; dateFrom=''; dateTo=''; fetchBookmarks()">清除</button>
        </div>
      </div>

      <!-- Global Alert -->
      <div class="relative z-20">
        <div
          x-show="$store.alert.visible"
          x-transition:enter="transition ease-out duration-200"
          x-transition:enter-start="opacity-0 -translate-y-2"
          x-transition:enter-end="opacity-100 translate-y-0"
          x-transition:leave="transition ease-in duration-150"
          x-transition:leave-start="opacity-100 translate-y-0"
          x-transition:leave-end="opacity-0 -translate-y-2"
          class="absolute inset-x-0 pt-2"
          role="alert"
        >
          <div class="max-w-7xl mx-auto px-4 md:px-6">
            <div :class="'alert alert-' + $store.alert.type" class="shadow-md">
              <span x-text="$store.alert.message"></span>
              <button class="btn btn-ghost btn-sm btn-square ml-auto" @click="$store.alert.dismiss()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4" aria-hidden="true">
                  <path d="M18 6 6 18"></path>
                  <path d="m6 6 12 12"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Main Layout -->
      <div class="flex-1 max-w-7xl mx-auto w-full px-4 md:px-6 py-6 flex gap-6">

        <!-- Left Sidebar -->
        <aside class="hidden md:flex flex-col gap-3 w-48 shrink-0">
          <div class="card bg-base-100 border border-base-300 shadow-sm">
            <div class="card-body p-4 gap-3">
              <!-- Tags header -->
              <div class="flex items-center justify-between">
                <h2 class="font-semibold text-sm">标签</h2>
                <button
                  x-show="selectedTags.length > 0"
                  class="btn btn-ghost btn-xs text-xs"
                  @click="clearTagFilter()"
                >
                  清除
                </button>
              </div>

              <!-- Tags skeleton -->
              <div x-show="isLoadingTags" class="space-y-2">
                <div class="skeleton h-7 w-full rounded-btn"></div>
                <div class="skeleton h-7 w-full rounded-btn"></div>
                <div class="skeleton h-7 w-4/5 rounded-btn"></div>
                <div class="skeleton h-7 w-full rounded-btn"></div>
                <div class="skeleton h-7 w-3/4 rounded-btn"></div>
              </div>

              <!-- Tags error -->
              <div x-show="!isLoadingTags && tagsError" class="space-y-2">
                <p class="text-xs opacity-70" x-text="tagsError"></p>
                <button class="btn btn-xs btn-outline w-full" @click="fetchTags()">重试</button>
              </div>

              <!-- Tags list -->
              <div x-show="!isLoadingTags && !tagsError" class="space-y-1">
                <template x-for="tag in allTags" :key="tag.id">
                  <button
                    class="w-full text-left btn btn-xs justify-between"
                    :class="{
                      'btn-primary': selectedTags.includes(tag.slug),
                      'btn-error btn-outline': excludedTags.includes(tag.slug),
                      'btn-ghost': !selectedTags.includes(tag.slug) && !excludedTags.includes(tag.slug)
                    }"
                    @click="$event.shiftKey ? toggleExcludeTag(tag.slug) : toggleTag(tag.slug)"
                    :title="'Shift+点击排除 ' + tag.name"
                  >
                    <span class="truncate" x-text="tag.name"></span>
                    <span class="badge badge-xs ml-1 shrink-0" x-text="tag.usage_count"></span>
                  </button>
                </template>
                <div x-show="allTags.length === 0" class="text-xs opacity-50 text-center py-2">暂无标签</div>
              </div>

              <!-- Manage tags button -->
              <div class="pt-1 border-t border-base-300">
                <button
                  class="btn btn-xs btn-ghost w-full"
                  @click="$refs.tagsModal.showModal()"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3" aria-hidden="true">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                  </svg>
                  管理标签
                </button>
              </div>
            </div>
          </div>

          <!-- Saved Queries Card -->
          <div class="card bg-base-100 border border-base-300 shadow-sm">
            <div class="card-body p-4 gap-3">
              <div class="flex items-center justify-between">
                <h2 class="font-semibold text-sm">智能集合</h2>
                <button
                  x-show="!showSaveQueryInput"
                  class="btn btn-ghost btn-xs"
                  title="保存当前筛选"
                  @click="showSaveQueryInput = true"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3" aria-hidden="true">
                    <path d="M5 12h14"></path><path d="M12 5v14"></path>
                  </svg>
                </button>
              </div>
              <div x-show="showSaveQueryInput" class="flex gap-1">
                <input
                  type="text"
                  class="input input-bordered input-xs flex-1"
                  placeholder="集合名称..."
                  x-model="saveQueryName"
                  x-effect="if (showSaveQueryInput) $nextTick(() => $el.focus())"
                  @keydown.enter.prevent="if (saveQueryName.trim()) { saveCurrentQuery(saveQueryName.trim()); showSaveQueryInput = false; saveQueryName = ''; }"
                  @keydown.escape="showSaveQueryInput = false; saveQueryName = ''"
                />
                <button
                  class="btn btn-xs btn-primary shrink-0"
                  :disabled="!saveQueryName.trim() || isSavingQuery"
                  @click="saveCurrentQuery(saveQueryName.trim()); showSaveQueryInput = false; saveQueryName = ''"
                >保存</button>
                <button class="btn btn-xs btn-ghost shrink-0" @click="showSaveQueryInput = false; saveQueryName = ''">×</button>
              </div>

              <div x-show="isLoadingSavedQueries" class="space-y-2">
                <div class="skeleton h-7 w-full rounded-btn"></div>
                <div class="skeleton h-7 w-4/5 rounded-btn"></div>
              </div>

              <div x-show="!isLoadingSavedQueries" class="space-y-1">
                <template x-for="sq in savedQueries" :key="sq.id">
                  <div class="flex items-center gap-1 group">
                    <button
                      class="flex-1 text-left btn btn-xs btn-ghost justify-start truncate"
                      @click="applyQuery(sq)"
                    >
                      <svg x-show="sq.pinned" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-3 h-3 text-warning shrink-0" aria-hidden="true">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                      </svg>
                      <span class="truncate" x-text="sq.name"></span>
                    </button>
                    <div class="hidden group-hover:flex items-center gap-0.5 shrink-0">
                      <button class="btn btn-ghost btn-xs btn-square" @click="togglePinQuery(sq)" :title="sq.pinned ? '取消置顶' : '置顶'">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3" aria-hidden="true">
                          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                        </svg>
                      </button>
                      <button class="btn btn-ghost btn-xs btn-square text-error" @click="deleteQuery(sq)" title="删除">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3" aria-hidden="true">
                          <path d="M18 6 6 18"></path><path d="m6 6 12 12"></path>
                        </svg>
                      </button>
                    </div>
                  </div>
                </template>
                <div x-show="savedQueries.length === 0" class="text-xs opacity-50 text-center py-2">暂无智能集合</div>
              </div>
            </div>
          </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 min-w-0 space-y-4">

          <!-- Filter status bar -->
          <div x-show="selectedTags.length > 0 || excludedTags.length > 0" class="flex flex-wrap gap-2 items-center">
            <span class="text-sm opacity-60">筛选：</span>
            <template x-for="slug in selectedTags" :key="slug">
              <span class="badge badge-primary gap-1">
                <span x-text="allTags.find(t => t.slug === slug)?.name || slug"></span>
                <button @click="toggleTag(slug)" class="hover:opacity-70" aria-label="移除标签">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3" aria-hidden="true">
                    <path d="M18 6 6 18"></path>
                    <path d="m6 6 12 12"></path>
                  </svg>
                </button>
              </span>
            </template>
            <template x-for="slug in excludedTags" :key="'not-' + slug">
              <span class="badge badge-error badge-outline gap-1">
                <span class="opacity-70 text-xs">NOT</span>
                <span x-text="allTags.find(t => t.slug === slug)?.name || slug"></span>
                <button @click="toggleExcludeTag(slug)" class="hover:opacity-70" aria-label="移除排除">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3" aria-hidden="true">
                    <path d="M18 6 6 18"></path><path d="m6 6 12 12"></path>
                  </svg>
                </button>
              </span>
            </template>
          </div>

          <!-- Batch toolbar -->
          <div x-show="isBatchMode" class="flex items-center gap-2 flex-wrap p-3 bg-base-100 rounded-box border border-base-300 mb-3">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="checkbox checkbox-sm"
                :checked="selectedBookmarkIds.length === bookmarks.length && bookmarks.length > 0"
                @change="toggleSelectAll()"
              />
              <span class="text-sm" x-text="selectedBookmarkIds.length ? `已选 ${selectedBookmarkIds.length} 个` : '全选'"></span>
            </label>

            <div class="flex-1"></div>

            <!-- Batch tag -->
            <div class="relative" x-show="selectedBookmarkIds.length > 0">
              <div class="flex gap-1">
                <input
                  type="text"
                  class="input input-bordered input-xs w-32"
                  placeholder="搜索标签..."
                  x-model="batchTagInput"
                  @input="filterBatchTagSuggestions()"
                />
              </div>
              <div
                x-show="batchTagInput && batchTagSearchResults.length > 0"
                class="absolute top-full left-0 z-50 mt-1 bg-base-100 border border-base-300 rounded-box shadow-lg max-h-40 overflow-y-auto w-40"
              >
                <template x-for="tag in batchTagSearchResults" :key="tag.id">
                  <button
                    class="w-full text-left px-3 py-1.5 text-sm hover:bg-base-200"
                    :disabled="isBatchTagging"
                    @click="handleBatchAddTag(tag)"
                    x-text="tag.name"
                  ></button>
                </template>
              </div>
            </div>

            <button
              class="btn btn-error btn-sm"
              :class="{ 'loading': isBatchDeleting }"
              :disabled="selectedBookmarkIds.length === 0 || isBatchDeleting"
              @click="handleBatchDelete()"
            >
              <svg x-show="!isBatchDeleting" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4" aria-hidden="true">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
              </svg>
              <span x-text="selectedBookmarkIds.length ? `删除 (${selectedBookmarkIds.length})` : '删除'"></span>
            </button>
          </div>

          <!-- Bookmark skeleton -->
          <div x-show="isLoadingBookmarks" class="space-y-3">
            <div class="card bg-base-100 border border-base-300 shadow-sm">
              <div class="card-body p-4 gap-3">
                <div class="skeleton h-5 w-3/4"></div>
                <div class="skeleton h-4 w-1/3"></div>
                <div class="skeleton h-8 w-full"></div>
                <div class="flex gap-2"><div class="skeleton h-5 w-16"></div><div class="skeleton h-5 w-12"></div></div>
              </div>
            </div>
            <div class="card bg-base-100 border border-base-300 shadow-sm">
              <div class="card-body p-4 gap-3">
                <div class="skeleton h-5 w-2/3"></div>
                <div class="skeleton h-4 w-1/4"></div>
                <div class="skeleton h-8 w-full"></div>
                <div class="flex gap-2"><div class="skeleton h-5 w-20"></div><div class="skeleton h-5 w-14"></div></div>
              </div>
            </div>
            <div class="card bg-base-100 border border-base-300 shadow-sm">
              <div class="card-body p-4 gap-3">
                <div class="skeleton h-5 w-4/5"></div>
                <div class="skeleton h-4 w-2/5"></div>
                <div class="skeleton h-8 w-full"></div>
                <div class="flex gap-2"><div class="skeleton h-5 w-14"></div><div class="skeleton h-5 w-10"></div></div>
              </div>
            </div>
          </div>

          <!-- Bookmarks error -->
          <div x-show="!isLoadingBookmarks && bookmarksError" class="card bg-base-100 border border-base-300 shadow-sm">
            <div class="card-body p-4 flex-row items-center gap-3">
              <p class="text-sm opacity-70 flex-1" x-text="bookmarksError"></p>
              <button class="btn btn-sm btn-outline shrink-0" @click="fetchBookmarks()">重试</button>
            </div>
          </div>

          <!-- Empty state -->
          <div x-show="!isLoadingBookmarks && !bookmarksError && bookmarks.length === 0" class="card bg-base-100 border border-base-300 shadow-sm">
            <div class="card-body items-center text-center py-12 gap-3">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-10 h-10 opacity-30" aria-hidden="true">
                <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"></path>
              </svg>
              <p class="opacity-50 text-sm">暂无书签，点击「保存链接」添加第一个</p>
            </div>
          </div>

          <!-- Bookmark list -->
          <div x-show="!isLoadingBookmarks && !bookmarksError && bookmarks.length > 0" class="space-y-3">
            <template x-for="bm in bookmarks" :key="bm.id">
              <article class="card bg-base-100 border border-base-300 shadow-sm hover:border-base-content/20 transition-colors">
                <div class="card-body p-4 gap-2 flex-row">
                  <!-- Batch checkbox -->
                  <div x-show="isBatchMode" class="pt-1 shrink-0">
                    <input
                      type="checkbox"
                      class="checkbox checkbox-sm"
                      :checked="selectedBookmarkIds.includes(bm.id)"
                      @change="toggleBookmarkSelect(bm.id)"
                    />
                  </div>
                  <!-- Existing content wrapper -->
                  <div class="flex-1 min-w-0 flex flex-col gap-2">
                    <!-- Title & domain row -->
                    <div class="flex items-start justify-between gap-2">
                      <div class="min-w-0 flex-1">
                        <a
                          :href="bm.url"
                          target="_blank"
                          rel="noopener noreferrer"
                          class="font-medium text-base leading-snug hover:text-primary transition-colors line-clamp-2"
                          x-text="bm.title || bm.url"
                        ></a>
                        <div class="flex items-center gap-2 mt-0.5">
                          <span class="text-xs opacity-50" x-text="bm.domain"></span>
                          <span class="text-xs opacity-30">·</span>
                          <span class="badge badge-xs badge-outline opacity-60" x-text="bm.type" x-show="bm.type && bm.type !== 'other'"></span>
                        </div>
                      </div>
                      <!-- Action buttons -->
                      <div class="flex items-center gap-1 shrink-0">
                        <button
                          class="btn btn-ghost btn-xs btn-square"
                          @click="openEditModal(bm)"
                          title="编辑"
                        >
                          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5" aria-hidden="true">
                            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                          </svg>
                        </button>
                        <button
                          class="btn btn-ghost btn-xs btn-square text-error"
                          @click="deleteBookmark(bm.id)"
                          title="删除"
                        >
                          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5" aria-hidden="true">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                            <path d="M10 11v6"></path>
                            <path d="M14 11v6"></path>
                            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
                          </svg>
                        </button>
                      </div>
                    </div>

                    <!-- Summary -->
                    <p x-show="bm.summary" class="text-sm opacity-70 line-clamp-2" x-text="bm.summary"></p>

                    <!-- Note -->
                    <p x-show="bm.note" class="text-xs opacity-50 italic line-clamp-2" x-text="'备注: ' + bm.note"></p>

    <script>
      const API_BASE = '';
      let _alertTimer = null;

      document.addEventListener('alpine:init', () => {

        Alpine.store('alert', {
          message: '',
          type: 'success',
          visible: false,
          show(msg, type = 'success') {
            clearTimeout(_alertTimer);
            this.message = msg;
            this.type = type;
            this.visible = true;
            _alertTimer = setTimeout(() => {
              this.visible = false;
            }, 3000);
          },
          dismiss() {
            clearTimeout(_alertTimer);
            this.visible = false;
          }
        });

        Alpine.store('confirm', {
          message: '',
          visible: false,
          _resolve: null,
          open(msg) {
            this.message = msg;
            this.visible = true;
            return new Promise(resolve => { this._resolve = resolve; });
          },
          confirm() {
            this.visible = false;
            if (this._resolve) { this._resolve(true); this._resolve = null; }
          },
          cancel() {
            this.visible = false;
            if (this._resolve) { this._resolve(false); this._resolve = null; }
          }
        });

        Alpine.data('indexPage', () => ({
          // Bookmark list state
          bookmarks: [],
          isLoadingBookmarks: false,
          bookmarksError: '',
          searchQuery: '',
          selectedTags: [],
          // Batch operation state
          selectedBookmarkIds: [],
          isBatchMode: false,
          isBatchDeleting: false,
          isBatchTagging: false,
          batchTagInput: '',
          batchTagSearchResults: [],
          // Advanced filter state
          excludedTags: [],
          domainFilter: '',
          dateFrom: '',
          dateTo: '',
          showAdvancedFilter: false,
          offset: 0,
          hasMore: false,
          isLoadingMore: false,

          // Tags state
          allTags: [],
          isLoadingTags: false,
          tagsError: '',

          // Saved queries state
          savedQueries: [],
          isLoadingSavedQueries: false,
          isSavingQuery: false,
          showSaveQueryInput: false,
          saveQueryName: '',
          processingQueryIds: new Set(),

          // Save modal state
          saveForm: {
            url: '',
            title: '',
            type: 'other',
            summary: '',
            note: '',
            selectedTags: [],
            suggestedTags: []
          },
          isSaving: false,
          isEnriching: false,
          tagInput: '',
          tagSearchResults: [],

          // Edit modal state
          editForm: {
            id: '',
            title: '',
            type: 'other',
            summary: '',
            note: '',
            selectedTags: []
          },
          isUpdating: false,
          editTagInput: '',
          editTagSearchResults: [],

          // Tags management state
          newTagName: '',
          isCreatingTag: false,
          editingTagId: null,
          editingTagName: '',

          // Tag merge / alias state
          mergingTagId: null,
          mergeTargetId: '',
          isMerging: false,
          aliasTagId: null,
          aliasInput: '',
          tagAliases: [],
          isLoadingAliases: false,
          isAddingAlias: false,

          async init() {
            await Promise.all([this.fetchBookmarks(), this.fetchTags(), this.fetchSavedQueries()]);
          },

          // ---- Bookmark fetching ----

          async fetchBookmarks() {
            this.isLoadingBookmarks = true;
            this.bookmarksError = '';
            this.offset = 0;
            try {
              const params = new URLSearchParams({ limit: '30', offset: '0' });
              if (this.searchQuery.trim()) params.set('q', this.searchQuery.trim());
              if (this.selectedTags.length) params.set('tags', this.selectedTags.join(','));
              if (this.excludedTags.length) params.set('not_tags', this.excludedTags.join(','));
              if (this.domainFilter.trim()) params.set('domain', this.domainFilter.trim());
              if (this.dateFrom) params.set('from', String(dayjs(this.dateFrom).unix()));
              if (this.dateTo) params.set('to', String(dayjs(this.dateTo).endOf('day').unix()));
              const res = await fetch(`${API_BASE}/api/bookmarks?${params.toString()}`);
              if (!res.ok) throw new Error(`加载失败: HTTP ${res.status}`);
              const json = await res.json();
              if (!json.ok) throw new Error(json.error || 'request failed');
              this.bookmarks = json.data;
              this.hasMore = json.data.length === 30;
            } catch (e) {
              this.bookmarksError = e?.message || '加载书签失败，请稍后重试';
            } finally {
              this.isLoadingBookmarks = false;
            }
          },

          async loadMore() {
            this.isLoadingMore = true;
            this.offset += 30;
            try {
              const params = new URLSearchParams({ limit: '30', offset: String(this.offset) });
              if (this.searchQuery.trim()) params.set('q', this.searchQuery.trim());
              if (this.selectedTags.length) params.set('tags', this.selectedTags.join(','));
              if (this.excludedTags.length) params.set('not_tags', this.excludedTags.join(','));
              if (this.domainFilter.trim()) params.set('domain', this.domainFilter.trim());
              if (this.dateFrom) params.set('from', String(dayjs(this.dateFrom).unix()));
              if (this.dateTo) params.set('to', String(dayjs(this.dateTo).endOf('day').unix()));
              const res = await fetch(`${API_BASE}/api/bookmarks?${params.toString()}`);
              if (!res.ok) throw new Error(`加载失败: HTTP ${res.status}`);
              const json = await res.json();
              const items = json.data;
              this.bookmarks.push(...items);
              this.hasMore = items.length === 30;
            } catch (e) {
              Alpine.store('alert').show(e?.message || '加载更多失败', 'error');
            } finally {
              this.isLoadingMore = false;
            }
          },

          toggleTag(slug) {
            const idx = this.selectedTags.indexOf(slug);
            if (idx === -1) {
              this.selectedTags.push(slug);
            } else {
              this.selectedTags.splice(idx, 1);
            }
            this.fetchBookmarks();
          },

          clearTagFilter() {
            this.selectedTags = [];
            this.fetchBookmarks();
          },

          toggleExcludeTag(slug) {
            // Remove from selectedTags first (can't both select and exclude)
            this.selectedTags = this.selectedTags.filter(s => s !== slug);
            const idx = this.excludedTags.indexOf(slug);
            if (idx === -1) {
              this.excludedTags.push(slug);
            } else {
              this.excludedTags.splice(idx, 1);
            }
            this.fetchBookmarks();
          },

          toggleBatchMode() {
            this.isBatchMode = !this.isBatchMode;
            if (!this.isBatchMode) this.selectedBookmarkIds = [];
          },

          toggleBookmarkSelect(id) {
            const idx = this.selectedBookmarkIds.indexOf(id);
            if (idx === -1) this.selectedBookmarkIds.push(id);
            else this.selectedBookmarkIds.splice(idx, 1);
          },

          toggleSelectAll() {
            if (this.selectedBookmarkIds.length === this.bookmarks.length) {
              this.selectedBookmarkIds = [];
            } else {
              this.selectedBookmarkIds = this.bookmarks.map(b => b.id);
            }
          },

          async handleBatchDelete() {
            if (!this.selectedBookmarkIds.length || this.isBatchDeleting) return;
            if (!await Alpine.store('confirm').open(`确认删除选中的 ${this.selectedBookmarkIds.length} 个书签？`)) return;
            this.isBatchDeleting = true;
            try {
              await Promise.all(
                this.selectedBookmarkIds.map(id =>
                  fetch(`${API_BASE}/api/bookmarks/${id}`, { method: 'DELETE' })
                )
              );
              this.selectedBookmarkIds = [];
              Alpine.store('alert').show('批量删除成功', 'success');
              await this.fetchBookmarks();
              await this.fetchTags();
            } catch {
              Alpine.store('alert').show('部分删除失败', 'error');
            } finally {
              this.isBatchDeleting = false;
            }
          },

          filterBatchTagSuggestions() {
            const q = this.batchTagInput.trim().toLowerCase();
            if (!q) { this.batchTagSearchResults = []; return; }
            this.batchTagSearchResults = this.allTags.filter(t => t.name.toLowerCase().includes(q));
          },

          async handleBatchAddTag(tag) {
            if (!this.selectedBookmarkIds.length || this.isBatchTagging) return;
            this.isBatchTagging = true;
            try {
              for (const bmId of this.selectedBookmarkIds) {
                const bm = this.bookmarks.find(b => b.id === bmId);
                if (!bm) continue;
                const currentTagIds = (bm.tags || []).map(t => t.id);
                if (currentTagIds.includes(tag.id)) continue;
                await fetch(`${API_BASE}/api/bookmarks/${bmId}`, {
                  method: 'PUT',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ tag_ids: [...currentTagIds, tag.id] }),
                });
              }
              this.batchTagInput = '';
              this.batchTagSearchResults = [];
              await this.fetchBookmarks();
              await this.fetchTags();
              Alpine.store('alert').show(`已为选中书签添加标签「${tag.name}」`, 'success');
            } catch {
              Alpine.store('alert').show('批量打标签失败', 'error');
            } finally {
              this.isBatchTagging = false;
            }
          },

          async deleteBookmark(id) {
            if (!await Alpine.store('confirm').open('确认删除这个书签？')) return;
            try {
              const res = await fetch(`${API_BASE}/api/bookmarks/${id}`, { method: 'DELETE' });
              if (!res.ok) throw new Error(`删除失败: HTTP ${res.status}`);
              this.bookmarks = this.bookmarks.filter(b => b.id !== id);
              Alpine.store('alert').show('书签已删除', 'success');
            } catch (e) {
              Alpine.store('alert').show(e?.message || '删除失败', 'error');
            }
          },

          // ---- Tags fetching ----

          async fetchTags() {
            this.isLoadingTags = true;
            this.tagsError = '';
            try {
              const res = await fetch(`${API_BASE}/api/tags`);
              if (!res.ok) throw new Error(`加载失败: HTTP ${res.status}`);
              const json = await res.json();
              this.allTags = json.data;
            } catch (e) {
              this.tagsError = e?.message || '加载标签失败';
            } finally {
              this.isLoadingTags = false;
            }
          },

          // ---- Saved queries ----

          async fetchSavedQueries() {
            this.isLoadingSavedQueries = true;
            try {
              const res = await fetch(`${API_BASE}/api/saved-queries`);
              if (!res.ok) throw new Error();
              const json = await res.json();
              this.savedQueries = json.data;
            } catch {
              // silent fail - doesn't affect main flow
            } finally {
              this.isLoadingSavedQueries = false;
            }
          },

          applyQuery(sq) {
            const q = sq.query || {};
            this.selectedTags = q.tags || [];
            this.excludedTags = q.not_tags || [];
            this.searchQuery = q.q || '';
            this.domainFilter = q.domain || '';
            this.dateFrom = q.from || '';
            this.dateTo = q.to || '';
            this.fetchBookmarks();
          },

          async saveCurrentQuery(name) {
            if (!name || this.isSavingQuery) return;
            const query = {};
            if (this.selectedTags.length) query.tags = [...this.selectedTags];
            if (this.excludedTags) { if (this.excludedTags.length) query.not_tags = [...this.excludedTags]; }
            if (this.searchQuery && this.searchQuery.trim()) query.q = this.searchQuery.trim();
            if (this.domainFilter && this.domainFilter.trim()) query.domain = this.domainFilter.trim();
            if (this.dateFrom) query.from = this.dateFrom;
            if (this.dateTo) query.to = this.dateTo;
            this.isSavingQuery = true;
            try {
              const res = await fetch(`${API_BASE}/api/saved-queries`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, query }),
              });
              if (!res.ok) throw new Error();
              const json = await res.json();
              this.savedQueries.unshift(json.data);
              Alpine.store('alert').show('已保存为智能集合', 'success');
            } catch {
              Alpine.store('alert').show('保存失败', 'error');
            } finally {
              this.isSavingQuery = false;
            }
          },

          async togglePinQuery(sq) {
            if (this.processingQueryIds.has(sq.id)) return;
            this.processingQueryIds.add(sq.id);
            try {
              const res = await fetch(`${API_BASE}/api/saved-queries/${sq.id}/pin`, { method: 'PATCH' });
              if (!res.ok) throw new Error();
              const json = await res.json();
              const idx = this.savedQueries.findIndex(s => s.id === sq.id);
              if (idx !== -1) this.savedQueries[idx] = json.data;
              this.savedQueries.sort((a, b) => b.pinned - a.pinned);
            } catch {
              Alpine.store('alert').show('操作失败', 'error');
            } finally {
              this.processingQueryIds.delete(sq.id);
            }
          },

          async deleteQuery(sq) {
            if (this.processingQueryIds.has(sq.id)) return;
            if (!await Alpine.store('confirm').open(`确认删除「${sq.name}」？`)) return;
            this.processingQueryIds.add(sq.id);
            try {
              const res = await fetch(`${API_BASE}/api/saved-queries/${sq.id}`, { method: 'DELETE' });
              if (!res.ok) throw new Error();
              this.savedQueries = this.savedQueries.filter(s => s.id !== sq.id);
            } catch {
              Alpine.store('alert').show('删除失败', 'error');
            } finally {
              this.processingQueryIds.delete(sq.id);
            }
          },

          // ---- Save modal ----

          async handleEnrich() {
            if (!this.saveForm.url) return;
            this.isEnriching = true;
            try {
              const res = await fetch(`${API_BASE}/api/ai/enrich`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: this.saveForm.url })
              });
              if (!res.ok) throw new Error(`AI 补全失败: HTTP ${res.status}`);
              const json = await res.json();
              const enrich = json.data;
              if (enrich.title && !this.saveForm.title) this.saveForm.title = enrich.title;
              if (enrich.summary) this.saveForm.summary = enrich.summary;
              if (enrich.type) this.saveForm.type = enrich.type;
              const selectedSlugs = this.saveForm.selectedTags.map(t => t.slug);
              this.saveForm.suggestedTags = (enrich.tags || []).filter(t => !selectedSlugs.includes(t.slug));
              this.saveForm._originalSuggestedTags = [...(this.saveForm.suggestedTags || [])];
              this.saveForm._acceptedAiTags = [];
              Alpine.store('alert').show('AI 补全成功', 'success');
            } catch (e) {
              Alpine.store('alert').show(e?.message || 'AI 补全失败', 'error');
            } finally {
              this.isEnriching = false;
            }
          },

          async addSuggestedTag(tag) {
            // tag is { slug, name, confidence }
            let found = this.allTags.find(t => t.slug === tag.slug);
            if (!found) {
              try {
                const resp = await fetch(`${API_BASE}/api/tags`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ name: tag.name }),
                });
                if (!resp.ok) throw new Error();
                const { data } = await resp.json();
                found = data;
                this.allTags.unshift(data);
              } catch { return; }
            }
            if (!this.saveForm.selectedTags.find(t => t.id === found.id)) {
              this.saveForm.selectedTags.push(found);
            }
            this.saveForm.suggestedTags = this.saveForm.suggestedTags.filter(t => t.slug !== tag.slug);
            // Track accepted AI tag
            this.saveForm._acceptedAiTags = this.saveForm._acceptedAiTags || [];
            this.saveForm._acceptedAiTags.push({ slug: tag.slug, confidence: tag.confidence });
            // Fire feedback immediately for existing bookmarks
            if (this.saveForm.bookmarkId) {
              fetch(`${API_BASE}/api/feedback`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  bookmark_id: this.saveForm.bookmarkId,
                  event_type: 'tag_accepted',
                  payload: { tag_slug: tag.slug, confidence: tag.confidence },
                }),
              }).catch(() => {});
            }
          },

          filterTagSuggestions() {
            const q = this.tagInput.trim().toLowerCase();
            if (!q) { this.tagSearchResults = []; return; }
            const selectedIds = this.saveForm.selectedTags.map(t => t.id);
            this.tagSearchResults = this.allTags.filter(t =>
              t.name.toLowerCase().includes(q) && !selectedIds.includes(t.id)
            );
          },

          selectTag(tag) {
            if (!this.saveForm.selectedTags.find(t => t.id === tag.id)) {
              this.saveForm.selectedTags.push(tag);
            }
            this.tagInput = '';
            this.tagSearchResults = [];
          },

          async addOrCreateTag() {
            const name = this.tagInput.trim();
            if (!name) return;
            // Check exact match
            let tag = this.allTags.find(t => t.name.toLowerCase() === name.toLowerCase());
            if (!tag) {
              // Create new tag
              try {
                const res = await fetch(`${API_BASE}/api/tags`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ name })
                });
                if (!res.ok) throw new Error(`创建标签失败: HTTP ${res.status}`);
                const json = await res.json();
                tag = json.data;
                this.allTags.push(tag);
              } catch (e) {
                Alpine.store('alert').show(e?.message || '创建标签失败', 'error');
                return;
              }
            }
            this.selectTag(tag);
          },

          removeTagFromForm(tag) {
            this.saveForm.selectedTags = this.saveForm.selectedTags.filter(t => t.id !== tag.id);
          },

          async handleSaveBookmark() {
            if (!this.saveForm.url) return;
            this.isSaving = true;
            try {
              const payload = {
                url: this.saveForm.url,
                title: this.saveForm.title,
                type: this.saveForm.type,
                summary: this.saveForm.summary,
                note: this.saveForm.note,
                tag_ids: this.saveForm.selectedTags.map(t => t.id)
              };
              const res = await fetch(`${API_BASE}/api/bookmarks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              if (!res.ok) throw new Error(`保存失败: HTTP ${res.status}`);
              const json = await res.json();
              // Fire feedback for accepted AI tags (new bookmark)
              if (!this.saveForm.bookmarkId) {
                for (const t of (this.saveForm._acceptedAiTags || [])) {
                  fetch(`${API_BASE}/api/feedback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      bookmark_id: json.data.id,
                      event_type: 'tag_accepted',
                      payload: { tag_slug: t.slug, confidence: t.confidence },
                    }),
                  }).catch(() => {});
                }
              }
              this.resetSaveForm();
              this.$refs.saveModal.close();
              await this.fetchBookmarks();
              await this.fetchTags();
              Alpine.store('alert').show('书签保存成功', 'success');
            } catch (e) {
              Alpine.store('alert').show(e?.message || '保存失败', 'error');
            } finally {
              this.isSaving = false;
            }
          },

          resetSaveForm() {
            this.saveForm = {
              url: '',
              title: '',
              type: 'other',
              summary: '',
              note: '',
              selectedTags: [],
              suggestedTags: []
            };
            this.tagInput = '';
            this.tagSearchResults = [];
            this.isEnriching = false;
          },

          // ---- Edit modal ----

          openEditModal(bm) {
            this.editForm = {
              id: bm.id,
              title: bm.title || '',
              type: bm.type || 'other',
              summary: bm.summary || '',
              note: bm.note || '',
              selectedTags: bm.tags ? [...bm.tags] : []
            };
            this.editTagInput = '';
            this.editTagSearchResults = [];
            this.$refs.editModal.showModal();
          },

          async handleUpdateBookmark() {
            this.isUpdating = true;
            try {
              const payload = {
                title: this.editForm.title,
                type: this.editForm.type,
                summary: this.editForm.summary,
                note: this.editForm.note,
                tag_ids: this.editForm.selectedTags.map(t => t.id)
              };
              const res = await fetch(`${API_BASE}/api/bookmarks/${this.editForm.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              if (!res.ok) throw new Error(`更新失败: HTTP ${res.status}`);
              this.$refs.editModal.close();
              await this.fetchBookmarks();
              await this.fetchTags();
              Alpine.store('alert').show('书签已更新', 'success');
            } catch (e) {
              Alpine.store('alert').show(e?.message || '更新失败', 'error');
            } finally {
              this.isUpdating = false;
            }
          },

          filterEditTagSuggestions() {
            const q = this.editTagInput.trim().toLowerCase();
            if (!q) { this.editTagSearchResults = []; return; }
            const selectedIds = this.editForm.selectedTags.map(t => t.id);
            this.editTagSearchResults = this.allTags.filter(t =>
              t.name.toLowerCase().includes(q) && !selectedIds.includes(t.id)
            );
          },

          selectEditTag(tag) {
            if (!this.editForm.selectedTags.find(t => t.id === tag.id)) {
              this.editForm.selectedTags.push(tag);
            }
            this.editTagInput = '';
            this.editTagSearchResults = [];
          },

          async addOrCreateEditTag() {
            const name = this.editTagInput.trim();
            if (!name) return;
            let tag = this.allTags.find(t => t.name.toLowerCase() === name.toLowerCase());
            if (!tag) {
              try {
                const res = await fetch(`${API_BASE}/api/tags`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ name })
                });
                if (!res.ok) throw new Error(`创建标签失败: HTTP ${res.status}`);
                const json = await res.json();
                tag = json.data;
                this.allTags.push(tag);
              } catch (e) {
                Alpine.store('alert').show(e?.message || '创建标签失败', 'error');
                return;
              }
            }
            this.selectEditTag(tag);
          },

          removeTagFromEditForm(tag) {
            this.editForm.selectedTags = this.editForm.selectedTags.filter(t => t.id !== tag.id);
          },

          // ---- Tags management ----

          async handleCreateTag() {
            const name = this.newTagName.trim();
            if (!name) return;
            this.isCreatingTag = true;
            try {
              const res = await fetch(`${API_BASE}/api/tags`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
              });
              if (!res.ok) throw new Error(`创建失败: HTTP ${res.status}`);
              const json = await res.json();
              const tag = json.data;
              this.allTags.push(tag);
              this.newTagName = '';
              Alpine.store('alert').show('标签创建成功', 'success');
            } catch (e) {
              Alpine.store('alert').show(e?.message || '创建标签失败', 'error');
            } finally {
              this.isCreatingTag = false;
            }
          },

          startEditTag(tag) {
            this.editingTagId = tag.id;
            this.editingTagName = tag.name;
          },

          async handleRenameTag(tag) {
            const name = this.editingTagName.trim();
            if (!name) return;
            try {
              const res = await fetch(`${API_BASE}/api/tags/${tag.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
              });
              if (!res.ok) throw new Error(`重命名失败: HTTP ${res.status}`);
              const json = await res.json();
              const updated = json.data;
              const idx = this.allTags.findIndex(t => t.id === tag.id);
              if (idx !== -1) this.allTags[idx] = updated;
              this.editingTagId = null;
              Alpine.store('alert').show('标签重命名成功', 'success');
            } catch (e) {
              Alpine.store('alert').show(e?.message || '重命名失败', 'error');
            }
          },

          async handleDeleteTag(tag) {
            if (!await Alpine.store('confirm').open(`确认删除标签「${tag.name}」？`)) return;
            try {
              const res = await fetch(`${API_BASE}/api/tags/${tag.id}`, { method: 'DELETE' });
              if (!res.ok) throw new Error(`删除失败: HTTP ${res.status}`);
              this.allTags = this.allTags.filter(t => t.id !== tag.id);
              this.selectedTags = this.selectedTags.filter(s => s !== tag.slug);
              await this.fetchBookmarks();
              Alpine.store('alert').show('标签已删除', 'success');
            } catch (e) {
              Alpine.store('alert').show(e?.message || '删除标签失败', 'error');
            }
          },

          startMerge(tag) {
            this.mergingTagId = tag.id;
            this.mergeTargetId = '';
          },

          async handleMerge() {
            if (!this.mergingTagId || !this.mergeTargetId || this.isMerging) return;
            if (!await Alpine.store('confirm').open('合并后源标签将被删除，确认？')) return;
            this.isMerging = true;
            try {
              const res = await fetch(`${API_BASE}/api/tags/${this.mergingTagId}/merge`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target_tag_id: this.mergeTargetId }),
              });
              if (!res.ok) throw new Error((await res.json()).error || '合并失败');
              this.allTags = this.allTags.filter(t => t.id !== this.mergingTagId);
              this.mergingTagId = null;
              this.mergeTargetId = '';
              await this.fetchBookmarks();
              await this.fetchTags();
              Alpine.store('alert').show('标签合并成功', 'success');
            } catch (e) {
              Alpine.store('alert').show(e?.message || '合并失败', 'error');
            } finally {
              this.isMerging = false;
            }
          },

          async openAliasManager(tag) {
            this.aliasTagId = tag.id;
            this.aliasInput = '';
            this.isLoadingAliases = true;
            try {
              const res = await fetch(`${API_BASE}/api/tags/${tag.id}/aliases`);
              const json = await res.json();
              this.tagAliases = json.data || [];
            } catch {
              this.tagAliases = [];
            } finally {
              this.isLoadingAliases = false;
            }
            this.$refs.aliasModal.showModal();
          },

          async handleAddAlias() {
            const alias = this.aliasInput.trim();
            if (!alias || this.isAddingAlias) return;
            this.isAddingAlias = true;
            try {
              const res = await fetch(`${API_BASE}/api/tags/${this.aliasTagId}/aliases`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ alias }),
              });
              const json = await res.json();
              if (!res.ok) throw new Error(json.error || '添加失败');
              this.tagAliases.push(json.data);
              this.aliasInput = '';
            } catch (e) {
              Alpine.store('alert').show(e?.message || '添加别名失败', 'error');
            } finally {
              this.isAddingAlias = false;
            }
          },

          async handleDeleteAlias(alias) {
            try {
              const res = await fetch(`${API_BASE}/api/tags/${this.aliasTagId}/aliases/${alias.id}`, { method: 'DELETE' });
              if (!res.ok) throw new Error();
              this.tagAliases = this.tagAliases.filter(a => a.id !== alias.id);
            } catch {
              Alpine.store('alert').show('删除别名失败', 'error');
            }
          },

          // ---- Utilities ----

          formatDate(ts) {
            if (!ts) return '';
            return dayjs.unix(ts).format('YYYY-MM-DD HH:mm');
          }
        }));
      });
    </script>
  </body>
</html>
